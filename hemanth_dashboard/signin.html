<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>DASHMIN - Bootstrap Admin Template</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Gainsight PX Tag -->
    <script type="text/javascript">
        (function(n,t,a,e,co){var i="aptrinsic";n[i]=n[i]||function(){
            (n[i].q=n[i].q||[]).push(arguments)},n[i].p=e;n[i].c=co;
            var r=t.createElement("script");r.async=!0;r.src=a+"?a="+e;
            var c=t.getElementsByTagName("script")[0];c.parentNode.insertBefore(r,c)
        })(window,document,"https://web-sdk.aptrinsic.com/api/aptrinsic.js","AP-E7C6SOVIDK3N-2");
    </script>

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons & CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
<div class="container-xxl position-relative bg-white d-flex p-0">

    <!-- Spinner -->
    <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <!-- Sign In Form -->
    <div class="container-fluid">
        <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
            <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
                <div class="bg-light rounded p-4 p-sm-5 my-4 mx-3">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <a href="index.html">
                            <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>DASHMIN</h3>
                        </a>
                        <h3>Sign In</h3>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Email address</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                        <label for="floatingPassword">Password</label>
                    </div>
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="exampleCheck1">
                            <label class="form-check-label" for="exampleCheck1">Remember me</label>
                        </div>
                        <a href="">Forgot Password</a>
                    </div>
                    <button type="submit" class="btn btn-primary py-3 w-100 mb-4" id="signinButton">Sign In</button>
                    <p class="text-center mb-0">Don't have an Account? <a href="">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- JS Libraries -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Users -->
<script src="js/users.js"></script>

<!-- Signin Logic -->
<script>
    // Hide spinner on load
    window.addEventListener('load', function() {
        const spinner = document.getElementById('spinner');
        if (spinner) spinner.classList.remove('show');
    });

    // Generate dynamic userId from email
    function generateUserId(email) {
        if (!email || !email.includes("@")) return "";
        return email.split("@")[0].replace(/\+/g, "-").replace(/\./g, "-").toLowerCase();
    }

    // Sign in button logic
    document.getElementById('signinButton').addEventListener('click', function(event) {
        event.preventDefault();

        const email = document.getElementById('floatingInput').value.trim();
        const password = document.getElementById('floatingPassword').value.trim();

        if (!email.includes("@")) {
            alert("Please enter a valid email.");
            return;
        }

        const userObj = users.find(u => u.email === email && u.password === password);

        if (userObj) {
        // Tab-specific session
        sessionStorage.setItem('loggedIn', 'true');
        sessionStorage.setItem('firstName', userObj.firstName || "");
        sessionStorage.setItem('lastName', userObj.lastName || "");
        sessionStorage.setItem('email', userObj.email);

            const userId = generateUserId(email);

            // Identify user for Gainsight
            aptrinsic("identify",
            {
                id: userId,
                email: email,
                firstName: userObj.firstName || "",
                lastName: userObj.lastName || "",
                signUpDate: Date.now(),
                plan: userObj.plan || "gold",
                price: userObj.price || "0",
                // price: 95.5,
                userHash: ""
            },
            {
                id: userObj.AccountId || "",
                name: userObj.AccountName || "",
                Program: "Platinum"
            });

            window.location.href = 'index.html';
        } else {
            alert('Invalid email or password');
        }
    });

    // Logout script
    document.addEventListener('DOMContentLoaded', function() {
        const logoutLink = document.getElementById('logout-link');
        if (logoutLink) {
            logoutLink.addEventListener('click', function(event) {
                event.preventDefault();
                localStorage.clear();
                window.location.href = 'signin.html';
            });
        }
    });
</script>

</body>
</html>
